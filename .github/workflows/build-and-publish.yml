name: build-and-publish

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
      extra_tags:
        description: "Optional extra image tags (comma-separated)"
        required: false
        type: string
      publish:
        description: "Publish image to GHCR"
        required: false
        default: true
        type: boolean
      deploy_target:
        description: "Where to deploy (updates tag in Flux repo)"
        type: choice
        options:
          - auto
          - none
          - dev
          - prod
        default: auto
      flux_tag_key_path_dev:
        description: "Dot path to tag key in dev manifest"
        required: false
        default: spec.values.image.tag
        type: string
      flux_tag_key_path_prod:
        description: "Dot path to tag key in prod manifest"
        required: false
        default: spec.values.image.tag
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sealcode

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/SealCode.slnx

      - name: Test
        run: dotnet test src/SealCode.slnx --no-restore --configuration Release

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
          INPUT_EXTRA_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_tags || '' }}
        run: |
          set -euo pipefail
          image_tag="${INPUT_IMAGE_TAG}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="${REF_NAME}-${SHA::8}"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${image_tag}"
            echo "${IMAGE_NAME}:${REF_NAME}"
            if [[ "${REF_NAME}" == "main" || "${REF_NAME}" == "master" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            if [[ -n "${INPUT_EXTRA_TAGS}" ]]; then
              IFS=',' read -ra extra <<< "${INPUT_EXTRA_TAGS}"
              for tag in "${extra[@]}"; do
                tag="$(echo "${tag}" | xargs)"
                if [[ -n "${tag}" ]]; then
                  echo "${IMAGE_NAME}:${tag}"
                fi
              done
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_flux:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    steps:
      - name: Resolve deploy params
        id: params
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DEPLOY_TARGET="${{ inputs.deploy_target }}"
            if [[ "${DEPLOY_TARGET}" == "auto" ]]; then
              if [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
                DEPLOY_TARGET="dev"
              elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
                DEPLOY_TARGET="prod"
              else
                DEPLOY_TARGET="none"
              fi
            fi
            TAG_KEY_PATH_DEV="${{ inputs.flux_tag_key_path_dev }}"
            TAG_KEY_PATH_PROD="${{ inputs.flux_tag_key_path_prod }}"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            DEPLOY_TARGET="dev"
            TAG_KEY_PATH_DEV="spec.values.image.tag"
            TAG_KEY_PATH_PROD="spec.values.image.tag"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            DEPLOY_TARGET="prod"
            TAG_KEY_PATH_DEV="spec.values.image.tag"
            TAG_KEY_PATH_PROD="spec.values.image.tag"
          else
            DEPLOY_TARGET="none"
            TAG_KEY_PATH_DEV="spec.values.image.tag"
            TAG_KEY_PATH_PROD="spec.values.image.tag"
          fi

          if [[ "${DEPLOY_TARGET}" == "dev" ]]; then
            FILE_PATH="${{ vars.FLUX_PATH_DEV || 'clusters/platform-dev/custom-resources/lp-dev/sealcode.yaml' }}"
            TAG_KEY_PATH="${TAG_KEY_PATH_DEV}"
            FLUX_REPO_BRANCH="${{ vars.FLUX_REPO_BRANCH_DEV || 'main' }}"
          elif [[ "${DEPLOY_TARGET}" == "prod" ]]; then
            FILE_PATH="${{ vars.FLUX_PATH_PROD || 'clusters/ovh-vpc-k3s-prod/custom-resources/lp/sealcode.yaml' }}"
            TAG_KEY_PATH="${TAG_KEY_PATH_PROD}"
            FLUX_REPO_BRANCH="${{ vars.FLUX_REPO_BRANCH_PROD || 'main' }}"
          else
            FILE_PATH=""
            TAG_KEY_PATH=""
            FLUX_REPO_BRANCH="${{ vars.FLUX_REPO_BRANCH_DEV || 'main' }}"
          fi

          echo "deploy_target=${DEPLOY_TARGET}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ needs.publish.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "file_path=${FILE_PATH}" >> "$GITHUB_OUTPUT"
          echo "tag_key_path=${TAG_KEY_PATH}" >> "$GITHUB_OUTPUT"
          echo "flux_repo_branch=${FLUX_REPO_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Skip Flux update
        if: ${{ steps.params.outputs.deploy_target == 'none' }}
        run: echo "Skipping Flux update"

      - name: Generate GitHub App token for Flux repo
        if: ${{ steps.params.outputs.deploy_target != 'none' }}
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLUX_APP_ID }}
          private-key: ${{ secrets.FLUX_APP_PRIVATE_KEY }}
          owner: DeadNodes
          repositories: flux

      - name: Checkout Flux repo
        if: ${{ steps.params.outputs.deploy_target != 'none' }}
        uses: actions/checkout@v4
        with:
          repository: DeadNodes/flux
          ref: ${{ steps.params.outputs.flux_repo_branch }}
          token: ${{ steps.app_token.outputs.token }}
          path: flux-repo

      - name: Update Flux image tag
        if: ${{ steps.params.outputs.deploy_target != 'none' }}
        env:
          FILE_PATH: ${{ steps.params.outputs.file_path }}
          TAG_KEY_PATH: ${{ steps.params.outputs.tag_key_path }}
          IMAGE_TAG: ${{ steps.params.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          file_path = Path("flux-repo") / os.environ["FILE_PATH"]
          tag = os.environ["IMAGE_TAG"].strip()
          tag_path = os.environ.get("TAG_KEY_PATH", "spec.values.image.tag").strip()

          if not tag:
            raise SystemExit("IMAGE_TAG is empty")
          if not tag_path:
            raise SystemExit("TAG_KEY_PATH is empty")
          if not file_path.exists():
            raise SystemExit(f"Flux file not found: {file_path}")

          lines = file_path.read_text().splitlines(keepends=True)
          path_parts = [part for part in tag_path.split(".") if part]
          if not path_parts:
            raise SystemExit("TAG_KEY_PATH is empty after split")

          replaced = False
          stack = []

          def parse_key(line):
            match = re.match(r"^(\s*)([A-Za-z0-9_-]+):(?:\s*(.*))?$", line)
            if not match:
              return None, None
            return match.group(2), len(match.group(1))

          for index, line in enumerate(lines):
            if re.match(r"^\s*$", line):
              continue
            key, indent = parse_key(line)
            if key is None:
              continue
            while stack and indent <= stack[-1][1]:
              stack.pop()
            stack.append((key, indent))
            if [item[0] for item in stack] == path_parts:
              lines[index] = f"{' ' * indent}{key}: {tag}\n"
              replaced = True
              break

          if not replaced:
            raise SystemExit(f"tag path not found: {tag_path} in {file_path}")

          file_path.write_text("".join(lines))
          print(f"Updated {file_path} -> {tag}")
          PY

      - name: Commit and push Flux change
        if: ${{ steps.params.outputs.deploy_target != 'none' }}
        run: |
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.params.outputs.file_path }}"
          if git diff --cached --quiet; then
            echo "No Flux changes to commit"
            exit 0
          fi
          git commit -m "chore(sealcode): set image tag ${{ steps.params.outputs.image_tag }}"
          git push origin HEAD:${{ steps.params.outputs.flux_repo_branch }}
