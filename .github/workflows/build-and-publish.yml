name: build-and-publish

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
      extra_tags:
        description: "Optional extra image tags (comma-separated)"
        required: false
        type: string
      publish:
        description: "Publish image to GHCR"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sealcode

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/SealCode.slnx

      - name: Test
        run: dotnet test src/SealCode.slnx --no-restore --configuration Release

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
          INPUT_EXTRA_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_tags || '' }}
        run: |
          set -euo pipefail
          image_tag="${INPUT_IMAGE_TAG}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="${REF_NAME}-${SHA::8}"
          fi

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${image_tag}"
            echo "${IMAGE_NAME}:${REF_NAME}"
            if [[ "${REF_NAME}" == "main" || "${REF_NAME}" == "master" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            if [[ -n "${INPUT_EXTRA_TAGS}" ]]; then
              IFS=',' read -ra extra <<< "${INPUT_EXTRA_TAGS}"
              for tag in "${extra[@]}"; do
                tag="$(echo "${tag}" | xargs)"
                if [[ -n "${tag}" ]]; then
                  echo "${IMAGE_NAME}:${tag}"
                fi
              done
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
