name: build-and-publish

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Where to deploy (updates tag in Flux repo)"
        type: choice
        options:
          - none
          - dev
          - prod
        default: none
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
      extra_tags:
        description: "Optional extra image tags (comma-separated)"
        required: false
        type: string
      publish:
        description: "Publish image to GHCR"
        required: false
        default: true
        type: boolean
      flux_tag_key_path_dev:
        description: "Dot path to tag key in dev manifest"
        required: false
        default: spec.values.image.tag
        type: string
      flux_tag_key_path_prod:
        description: "Dot path to tag key in prod manifest"
        required: false
        default: spec.values.image.tag
        type: string

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/SealCode.slnx

      - name: Test
        run: dotnet test src/SealCode.slnx --no-restore --configuration Release

  deploy:
    needs: test
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy params
        id: params
        env:
          INPUT_DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || '' }}
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
          INPUT_EXTRA_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_tags || '' }}
          INPUT_FLUX_TAG_KEY_PATH_DEV: ${{ github.event_name == 'workflow_dispatch' && inputs.flux_tag_key_path_dev || '' }}
          INPUT_FLUX_TAG_KEY_PATH_PROD: ${{ github.event_name == 'workflow_dispatch' && inputs.flux_tag_key_path_prod || '' }}
        run: |
          set -euo pipefail

          deploy_target="${INPUT_DEPLOY_TARGET}"
          if [[ -z "${deploy_target}" ]]; then
            if [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
              deploy_target="dev"
            elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              deploy_target="prod"
            else
              deploy_target="none"
            fi
          fi

          image_tag="${INPUT_IMAGE_TAG}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="${GITHUB_REF_NAME}-${GITHUB_SHA::8}"
          fi

          flux_tag_key_path_dev="${INPUT_FLUX_TAG_KEY_PATH_DEV:-spec.values.image.tag}"
          flux_tag_key_path_prod="${INPUT_FLUX_TAG_KEY_PATH_PROD:-spec.values.image.tag}"

          {
            echo "deploy_target=${deploy_target}"
            echo "image_tag=${image_tag}"
            echo "extra_tags=${INPUT_EXTRA_TAGS}"
            echo "flux_tag_key_path_dev=${flux_tag_key_path_dev}"
            echo "flux_tag_key_path_prod=${flux_tag_key_path_prod}"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch private pipeline
        env:
          GH_TOKEN: ${{ secrets.PIPELINES_REPO_TOKEN || secrets.FLUX_REPO_TOKEN }}
          DEPLOY_TARGET: ${{ steps.params.outputs.deploy_target }}
          IMAGE_TAG: ${{ steps.params.outputs.image_tag }}
          EXTRA_TAGS: ${{ steps.params.outputs.extra_tags }}
          FLUX_TAG_KEY_PATH_DEV: ${{ steps.params.outputs.flux_tag_key_path_dev }}
          FLUX_TAG_KEY_PATH_PROD: ${{ steps.params.outputs.flux_tag_key_path_prod }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Missing PIPELINES_REPO_TOKEN or FLUX_REPO_TOKEN secret for dispatching DeadNodes/pipelines."
            exit 1
          fi

          gh workflow run deploy-external-repo.yml \
            --repo DeadNodes/pipelines \
            --ref main \
            -f source_repository="${GITHUB_REPOSITORY}" \
            -f source_ref="${GITHUB_SHA}" \
            -f app_name="sealcode" \
            -f image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/sealcode" \
            -f image_tag="${IMAGE_TAG}" \
            -f extra_tags="${EXTRA_TAGS}" \
            -f deploy_target="${DEPLOY_TARGET}" \
            -f dockerfile="Dockerfile" \
            -f build_context="." \
            -f flux_path_dev="${{ vars.FLUX_PATH_DEV || 'clusters/platform-dev/custom-resources/lp-dev/sealcode.yaml' }}" \
            -f flux_path_prod="${{ vars.FLUX_PATH_PROD || 'clusters/ovh-vpc-k3s-prod/custom-resources/lp/sealcode.yaml' }}" \
            -f flux_tag_key_path_dev="${FLUX_TAG_KEY_PATH_DEV}" \
            -f flux_tag_key_path_prod="${FLUX_TAG_KEY_PATH_PROD}"
