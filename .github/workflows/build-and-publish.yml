name: build-and-publish

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Where to deploy (updates tag in Flux repo)"
        type: choice
        options:
          - none
          - dev
          - prod
        default: none
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
      extra_tags:
        description: "Optional extra image tags (comma-separated)"
        required: false
        type: string
      publish:
        description: "Publish image to GHCR"
        required: false
        default: true
        type: boolean
      flux_tag_key_path_dev:
        description: "Dot path to tag key in dev manifest"
        required: false
        default: spec.values.image.tag
        type: string
      flux_tag_key_path_prod:
        description: "Dot path to tag key in prod manifest"
        required: false
        default: spec.values.image.tag
        type: string

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/SealCode.slnx

      - name: Test
        run: dotnet test src/SealCode.slnx --no-restore --configuration Release

  build:
    needs: test
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
    uses: DeadNodes/pipelines/.github/workflows/build-and-deploy.yml@main
    with:
      app_name: sealcode
      image_name: ghcr.io/${{ github.repository_owner }}/sealcode
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
      extra_tags: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_tags || '' }}
      deploy_target: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || (github.ref_name == 'dev' && 'dev' || ((github.ref_name == 'main' || github.ref_name == 'master') && 'prod' || 'none')) }}
      dockerfile: Dockerfile
      build_context: .
      flux_repo_dev: DeadNodes/flux
      flux_repo_prod: DeadNodes/flux
      flux_repo_branch_dev: ${{ vars.FLUX_REPO_BRANCH_DEV || 'main' }}
      flux_repo_branch_prod: ${{ vars.FLUX_REPO_BRANCH_PROD || 'main' }}
      flux_path_dev: ${{ vars.FLUX_PATH_DEV || 'clusters/platform-dev/custom-resources/lp-dev/sealcode.yaml' }}
      flux_path_prod: ${{ vars.FLUX_PATH_PROD || 'clusters/ovh-vpc-k3s-prod/custom-resources/lp/sealcode.yaml' }}
      flux_tag_key_path_dev: ${{ github.event_name == 'workflow_dispatch' && inputs.flux_tag_key_path_dev || vars.FLUX_TAG_KEY_PATH_DEV || 'spec.values.image.tag' }}
      flux_tag_key_path_prod: ${{ github.event_name == 'workflow_dispatch' && inputs.flux_tag_key_path_prod || vars.FLUX_TAG_KEY_PATH_PROD || 'spec.values.image.tag' }}
    secrets:
      FLUX_APP_ID: ${{ secrets.FLUX_APP_ID }}
      FLUX_APP_PRIVATE_KEY: ${{ secrets.FLUX_APP_PRIVATE_KEY }}
      FLUX_REPO_TOKEN: ${{ secrets.FLUX_REPO_TOKEN }}
